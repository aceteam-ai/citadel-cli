# citadel.yaml
node:
  name: ubuntu-3090-node
  tags: [rtx-3090, gpu, dev]

# NOTE: You probably only want ONE of these containers running
# as they can be quite resource intensive.
services:
  # - name: llamacpp
  #   compose_file: ./services/llamacpp.yml

  # - name: ollama
  #   compose_file: ./services/ollama.yml

  - name: vllm
    compose_file: ./services/vllm.yml

  # Text-to-image (HuggingFace diffusers). Enable this to serve image models
  # (SDXL-Turbo by default; override with DIFFUSERS_MODEL, e.g. SD 3.5 Medium).
  # The server listens on the diffusers contract port 7860 with a /health check;
  # the compose file maps host port 7861 to it (7860 is used by the terminal
  # server, 8100-8199 by other services and installed apps). Started remotely
  # via SERVICE_START "diffusers".
  # - name: diffusers
  #   compose_file: ./services/diffusers.yml

# Optional: node-wide preemption allowlist (citadel-cli#577). Services listed
# here are NEVER auto-stopped to make room for another deploy. Everything else is
# preemptible: a SERVICE_START that declares a VRAM budget may durably stop
# non-pinned services to fit. Omit for the default (all services preemptible).
# pinned_services:
#   - bonsai

# Optional: declare GPU capabilities explicitly.
# If omitted, capabilities are auto-detected via nvidia-smi at startup.
# capabilities:
#   gpus:
#     - name: "NVIDIA GeForce RTX 3090"
#       vram_mb: 24576
#       count: 1
#   engines:
#     - vllm
