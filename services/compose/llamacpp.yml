# services/compose/llamacpp.yml

services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: citadel-llamacpp
    ports:
      - "8080:8080"
    volumes:
      - ~/citadel-cache/llamacpp:/models
    command: ["--host", "0.0.0.0", "--port", "8080"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
