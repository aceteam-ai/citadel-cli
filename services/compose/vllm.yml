# services/compose/vllm.yml

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: citadel-vllm
    # Host port is owned by citadel (services/ports.go), supplied via
    # CITADEL_VLLM_HOST_PORT; the :? guard fails loudly if citadel forgot to
    # supply it. Left on the default 0.0.0.0 bind because peers reach this engine
    # directly over the mesh. The container still serves the OpenAI API on :8000.
    ports:
      - "${CITADEL_VLLM_HOST_PORT:?citadel must supply CITADEL_VLLM_HOST_PORT}:8000"
    volumes:
      - ~/citadel-cache/huggingface:/root/.cache/huggingface
    # The served model is interpolated from VLLM_MODEL so a SERVICE_START job
    # carrying a "model" payload can swap it (#530). Citadel persists the choice
    # to a sibling vllm.env passed via --env-file (see internal/compose/envfile.go);
    # the :- default keeps standalone `docker compose up` working unchanged.
    command: >-
      --host 0.0.0.0
      --port 8000
      --model ${VLLM_MODEL:-Qwen/Qwen3-8B}
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --max-model-len 16384
      --gpu-memory-utilization 0.85
      --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
